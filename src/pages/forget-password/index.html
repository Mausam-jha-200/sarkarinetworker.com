<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Sarkari Networker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#07111F;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
overflow-x:hidden;
position:relative;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:#2563EB;
filter:blur(220px);
top:-150px;
left:-150px;
opacity:.35;
}

body::after{
content:'';
position:absolute;
width:500px;
height:500px;
background:#06B6D4;
filter:blur(220px);
bottom:-150px;
right:-150px;
opacity:.35;
}

.container{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.12);
border-radius:35px;
overflow:hidden;
position:relative;
z-index:1;
}

/* LEFT */

.left{
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
background:rgba(255,255,255,.03);
}

.logo{
width:90px;
height:90px;
border-radius:25px;
background:linear-gradient(135deg,#2563EB,#06B6D4);
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:800;
color:#fff;
margin-bottom:25px;
}

.left h1{
font-size:42px;
color:white;
margin-bottom:15px;
}

.left h1 span{
color:#60A5FA;
}

.left p{
color:#CBD5E1;
line-height:1.8;
font-size:16px;
}

/* RIGHT */

.right{
padding:60px;
}

.title{
font-size:30px;
font-weight:700;
color:white;
margin-bottom:10px;
}

.subtitle{
color:#CBD5E1;
margin-bottom:25px;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
height:58px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
color:white;
font-size:15px;
}

.input-group input::placeholder{
color:#94A3B8;
}

.btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2563EB,#06B6D4);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-bottom:15px;
}

.otp{
display:flex;
gap:10px;
justify-content:space-between;
margin-bottom:20px;
}

.otp input{
width:55px;
height:55px;
text-align:center;
font-size:20px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
color:white;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
color:#60A5FA;
text-decoration:none;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
max-width:550px;
}

.left{
display:none;
}

.right{
padding:30px;
}

.otp input{
width:45px;
height:45px;
}

}
</style>
</head>
<body>

<div class="container">

<div class="left">

<div class="logo">SN</div>

<h1>Sarkari <span>Networker</span></h1>

<p>
Reset your password securely and regain access to your account.
Use OTP verification to create a new password safely.
</p>

</div>

<div class="right">

<div class="title">Forgot Password</div>

<div class="subtitle">
Enter your mobile number or email to receive OTP.
</div>

<div class="input-group">
<input type="text" placeholder="Email or Mobile Number">
</div>

<button class="btn">
Send OTP
</button>

<div class="otp">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<div class="input-group">
<input type="password" placeholder="New Password">
</div>

<div class="input-group">
<input type="password" placeholder="Confirm Password">
</div>

<button class="btn">
Reset Password
</button>

<div class="back">
<a href="../login/index.html">← Back to Login</a>
</div>

</div>

</div>

</body>
</html>
