<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admit Card | Sarkari Networker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../Componets/css/footer.css">
<link rel="stylesheet" href="../../componets/css/navbar.css">
<link rel="stylesheet" href="../../Componets/search/search.html">


</head>
<body>
<!-- 
<nav class="navbar">

<div class="logo">
Sarkari <span>Networker</span>
</div>

</nav> -->






<div id="navbar"></div>

<section class="hero">

<h1>Latest Admit Cards</h1>

<p>
Download Latest Sarkari Exam Admit Cards
</p>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Admit Card...">
</div>

</section>
<section class="admit-grid" id="admitContainer">
</section>

<div class="load-more-wrap">
    <button id="loadMoreBtn">
        Load More 
    </button>
</div>

<div id="footer"></div>

<script>
fetch("../../componets/footer/footer.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  })
  .catch(error => console.error("Footer Load Error:", error));
</script>

<script>

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("input",()=>{

const value =
searchInput.value.toLowerCase();

document
.querySelectorAll(".admit-card")
.forEach(card=>{

card.style.display =
card.textContent
.toLowerCase()
.includes(value)
? "block"
: "none";

});

});

</script>
<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

/* Scroll Animation */

const cards=document.querySelectorAll('.card');

window.addEventListener('scroll',()=>{

cards.forEach(card=>{

let top=card.getBoundingClientRect().top;

if(top<window.innerHeight-100){
card.style.opacity='1';
card.style.transform='translateY(0)';
}

});

});

cards.forEach(card=>{
card.style.opacity='0';
card.style.transform='translateY(50px)';
card.style.transition='0.6s';
});

</script>
<script src="script.js"></script>

<script>
  


fetch("../../componets/navbar/navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  })
  .catch(error => console.error("Navbar Load Error:", error));


</script>


</body>
</html>
