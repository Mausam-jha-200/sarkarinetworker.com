<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sarkari Networker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:350px;
height:350px;
background:#2563eb;
filter:blur(150px);
top:-100px;
left:-100px;
opacity:.5;
}

body::after{
content:'';
position:absolute;
width:350px;
height:350px;
background:#9333ea;
filter:blur(150px);
bottom:-100px;
right:-100px;
opacity:.5;
}

.login-card{
width:100%;
max-width:420px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:10px;
color:#2563EB;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

.input-group{
margin-bottom:18px;
}

.input-group input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.08);
color:#fff;
font-size:15px;
border:1px solid rgba(255,255,255,.1);
}

.input-group input::placeholder{
color:#94a3b8;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-2px);
}

.links{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

.links a{
color:#93c5fd;
text-decoration:none;
}

.google-btn{
width:100%;
padding:15px;
margin-top:15px;
border-radius:14px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.05);
color:#fff;
cursor:pointer;
}

@media(max-width:480px){

.login-card{
margin:20px;
padding:30px 20px;
}

}
</style>
</head>
<body>

<div class="login-card">

<div class="logo">Sarkari Networker</div>

<p class="subtitle">
Welcome Back
</p>

<form>

<div class="input-group">
<input type="email" placeholder="Email Address">
</div>

<div class="input-group">
<input type="password" placeholder="Password">
</div>

<button type="submit" class="login-btn">
Login
</button>

<button type="button" class="google-btn">
Continue with Google
</button>

<div class="links">
<a href="../forget-password/index.html">Forgot Password?</a>
<a href="../createaccount/index.html">Create Account</a>
</div>

</form>

</div>

</body>
</html>
