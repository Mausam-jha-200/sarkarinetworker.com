<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latest Jobs | Sarkari Networker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="../../Componets/css/footer.css">
<link rel="stylesheet" href="../../componets/css/navbar.css">
<link rel="stylesheet" href="../../componets/css/search.css">




</head>
<body>





<div id="navbar"></div>


<section class="hero">
<h1>Latest Job</h1>
<p>government job</p>


<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Internship...">
</div>
</section>





<section class="jobs-grid" id="jobsContainer"></section>

<div class="load-more-wrap">
    <button id="loadMoreBtn">Load More</button>
</div>


<div id="footer"></div>

<script>
fetch("../../componets/footer/footer.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  })
  .catch(error => console.error("Footer Load Error:", error));
</script>




<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

/* Scroll Animation */

const cards=document.querySelectorAll('.card');

window.addEventListener('scroll',()=>{

cards.forEach(card=>{

let top=card.getBoundingClientRect().top;

if(top<window.innerHeight-100){
card.style.opacity='1';
card.style.transform='translateY(0)';
}

});

});

cards.forEach(card=>{
card.style.opacity='0';
card.style.transform='translateY(50px)';
card.style.transition='0.6s';
});

</script>
<script>

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function() {

    const searchText = this.value.toLowerCase().trim();

    const items = document.querySelectorAll(".card, .box");

    items.forEach(item => {

        const text = item.textContent.toLowerCase();

        if (text.includes(searchText)) {
            item.style.display = "";
        } else {
            item.style.display = "none";
        }

    });

});



</script>
<script src="script.js"></script>

<script>
  


fetch("../../componets/navbar/navbar.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  })
  .catch(error => console.error("Navbar Load Error:", error));


</script>





</body>
</html>
